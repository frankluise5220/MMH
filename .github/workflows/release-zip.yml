name: Release ZIP (NAS)

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare ZIP
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME:-manual}"
          ZIP="mmh-nas-${TAG}.zip"
          rm -f "$ZIP"
          zip -r "$ZIP" . \
            -x ".git/*" \
            -x ".github/*" \
            -x "**/node_modules/*" \
            -x "**/.next/*" \
            -x "**/.turbo/*" \
            -x "**/.DS_Store" \
            -x ".env" \
            -x "*.log"
          echo "ZIP_NAME=$ZIP" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
